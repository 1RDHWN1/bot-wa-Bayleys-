name: Deploy Bot to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SSH key format
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | head -c 50
          echo "..."
          echo "${{ secrets.VPS_SSH_KEY }}" | tail -c 50
          echo ""
          echo "${{ secrets.VPS_SSH_KEY }}" | grep -q "BEGIN OPENSSH PRIVATE KEY" && echo "✅ Key format OK" || echo "⚠️ Key format may be wrong"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          debug: true
          script: |
            set -e
            cd ${{ secrets.BOT_DIR }}
            
            # Fix remote to use HTTPS (avoid needing GitHub SSH key on VPS)
            git remote set-url origin https://github.com/1RDHWN1/bot-wa-Bayleys-.git
            
            echo "🔄 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "📦 Installing dependencies (with retry)..."
            npm config set registry https://registry.npmjs.org/
            npm config set fetch-retries 3
            npm config set fetch-retry-mintimeout 10000
            npm config set fetch-retry-maxtimeout 60000
            npm ci --production --prefer-offline || npm ci --production
            
            echo "🔁 Hard restart bot (clear require cache)..."
            pm2 delete index > /dev/null 2>&1 || true
            pm2 flush > /dev/null 2>&1
            pm2 start index.js --name index --update-env > /dev/null 2>&1
            
            echo "✅ Deploy selesai!"
            pm2 status > /dev/null 2>&1
