name: Deploy Bot to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SSH key format
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | head -c 50
          echo "..."
          echo "${{ secrets.VPS_SSH_KEY }}" | tail -c 50
          echo ""
          echo "${{ secrets.VPS_SSH_KEY }}" | grep -q "BEGIN OPENSSH PRIVATE KEY" && echo "✅ Key format OK" || echo "⚠️ Key format may be wrong"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true
          script: |
            set -e
            cd ${{ secrets.BOT_DIR }}
            
            echo "🔄 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "📦 Installing dependencies..."
            npm ci --production
            
            echo "🔁 Restarting bot..."
            pm2 restart index --update-env
            
            echo "✅ Deploy selesai!"
            pm2 status
